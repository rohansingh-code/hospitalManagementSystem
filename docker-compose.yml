services:
  app:
    build: .
    container_name: hospital-app
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    networks:
      - hospital-network

  postgres:
    image: postgres:15
    container_name: hospital-db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hospital-network

  redis:
    image: redis:7-alpine
    container_name: hospital-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    networks:
      - hospital-network

volumes:
  postgres_data:
  redis_data:

networks:
  hospital-network: