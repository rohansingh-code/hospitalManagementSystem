services:
  app:
    build: .
    container_name: hospital-app
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - postgres
    networks:
      - hospital-network

  postgres:
    image: postgres:15
    container_name: hospital-db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hospital-network

volumes:
  postgres_data:

networks:
  hospital-network: